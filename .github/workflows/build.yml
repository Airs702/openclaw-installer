name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for openclaw-zh bundling)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bundle openclaw-zh (macOS)
        run: |
          mkdir -p bundled
          npm install --prefix bundled @qingchencloud/openclaw-zh --no-save
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Install GUI dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build macOS DMG
        run: npm run build:mac -- --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (for openclaw-zh bundling)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bundle openclaw-zh (Windows)
        run: |
          mkdir bundled
          npm install --prefix bundled @qingchencloud/openclaw-zh --no-save
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Install GUI dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build Windows installer
        run: npm run build:win -- --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
